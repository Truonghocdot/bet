      rel="stylesheet"
    >
    <style>
      :root {
        --primary-gold: #ff8a00;
        --primary-red: #ff6d66;
        --light-bg: #fff6f4;
      }
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--light-bg);
        overflow: hidden;
      }
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #ffffff 0%, #fff6f4 100%);
        z-index: 9999;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .loading-logo {
        width: 120px;
        height: auto;
        margin-bottom: 24px;
        filter: drop-shadow(0 0 15px rgba(255, 109, 102, 0.2));
        animation: pulse 2s ease-in-out infinite;
      }
      .loading-bar-container {
        width: 200px;
        height: 3px;
        background: rgba(255, 109, 102, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .loading-bar {
        position: absolute;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, var(--primary-red), var(--primary-gold));
        border-radius: 4px;
        animation: loading-slide 1.5s infinite ease-in-out;
      }
      .loading-text {
        margin-top: 16px;
        color: var(--primary-red);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      @keyframes loading-slide {
        0% { left: -40%; }
        100% { left: 140%; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <img src="/logo.png" alt="FF789 Loading" class="loading-logo" onerror="this.style.display='none'">
        <div class="loading-bar-container">
          <div class="loading-bar"></div>
        </div>
        <div class="loading-text">FF789 Đang tải...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
